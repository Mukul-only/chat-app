<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <link rel="stylesheet" href="style.css"/>
    <title>chat app</title>
</head>
<body>
    <h1 class="title">Live💬...</h1>
    <div class="main">
        <div class="name">
            <span><i class="far fa-user"></i></span>
            <input 
            type="text" 
            id="name-input"
             class="name-input" 
             value="new user" 
             maxlength="20"
            />
        </div>

        <ul class="message-conntainer" id="message-conntainer">
            <!-- Messages will be added here dynamically -->
        </ul>

        <form class="message-form" id="message-form">
            <input type="text" name="message" id="message-input" class="message-input">
            <div class="v-divider" id="v-divider"></div>
            <button type="submit" class="send-button">
                send
                <span><i class="fas fa-paper-plane"></i></span> 
            </button>
        </form>
        <h3 class="clients-total" id="clients-total">Total Clients: 1</h3> 
    </div>
      
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="main.js"></script>

</body>
</html>
